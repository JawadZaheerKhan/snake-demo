<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Snake Game</title>
<style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0f172a;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  h1 { margin: 0 0 8px; }
  .score { margin-bottom: 12px; font-size: 18px; opacity: 0.85; }
  canvas {
    background: #1e293b;
    border: 2px solid #334155;
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .hint { margin-top: 12px; font-size: 13px; opacity: 0.6; }
  button {
    margin-top: 14px;
    padding: 8px 16px;
    background: #22c55e;
    color: #0f172a;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: #16a34a; }
</style>
</head>
<body>
  <h1>🐍 Snake v2 by Talha</h1>
  <div class="score">Score: <span id="score">0</span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="hint">Use arrow keys or WASD to move</div>
  <button id="restart">Restart</button>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const restartBtn = document.getElementById('restart');

  const GRID = 20;
  const TILES = canvas.width / GRID;

  let snake, dir, nextDir, food, score, gameOver, tickHandle;

  function reset() {
    snake = [{ x: 10, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = dir;
    score = 0;
    gameOver = false;
    placeFood();
    scoreEl.textContent = score;
    if (tickHandle) clearInterval(tickHandle);
    tickHandle = setInterval(tick, 100);
  }

  function placeFood() {
    while (true) {
      const f = {
        x: Math.floor(Math.random() * TILES),
        y: Math.floor(Math.random() * TILES),
      };
      if (!snake.some(s => s.x === f.x && s.y === f.y)) {
        food = f;
        return;
      }
    }
  }

  function tick() {
    if (gameOver) return;
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (
      head.x < 0 || head.x >= TILES ||
      head.y < 0 || head.y >= TILES ||
      snake.some(s => s.x === head.x && s.y === head.y)
    ) {
      gameOver = true;
      draw();
      return;
    }

    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
    draw();
  }

  function draw() {
    ctx.fillStyle = '#1e293b';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = '#ef4444';
    ctx.fillRect(food.x * GRID, food.y * GRID, GRID - 1, GRID - 1);

    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? '#22c55e' : '#16a34a';
      ctx.fillRect(s.x * GRID, s.y * GRID, GRID - 1, GRID - 1);
    });

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2);
      ctx.font = '16px sans-serif';
      ctx.fillText('Press Restart to play again', canvas.width / 2, canvas.height / 2 + 30);
    }
  }

  document.addEventListener('keydown', (e) => {
    const k = e.key.toLowerCase();
    if ((k === 'arrowup' || k === 'w') && dir.y !== 1) nextDir = { x: 0, y: -1 };
    else if ((k === 'arrowdown' || k === 's') && dir.y !== -1) nextDir = { x: 0, y: 1 };
    else if ((k === 'arrowleft' || k === 'a') && dir.x !== 1) nextDir = { x: -1, y: 0 };
    else if ((k === 'arrowright' || k === 'd') && dir.x !== -1) nextDir = { x: 1, y: 0 };
  });

  restartBtn.addEventListener('click', reset);
  reset();
</script>
</body>
</html>
